<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Dashboard Viviana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #2d3a8c;
      --green: #2e7d32;
      --red: #c62828;
      --yellow: #f57f17;
      --gray: #9e9e9e;
      --text: #1a1a2e;
      --header-h: 65px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    header {
      background: var(--navy);
      color: white;
      padding: 14px 20px 10px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      height: var(--header-h);
    }

    header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.3px; }
    #updated { font-size: 0.72rem; opacity: 0.7; margin-top: 3px; }

    /* ---- TABS ---- */
    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 2px solid #e8e8e8;
      position: sticky;
      top: var(--header-h);
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .tab-btn {
      flex: 1;
      padding: 11px 4px;
      font-size: 0.72rem;
      font-weight: 700;
      text-align: center;
      border: none;
      background: none;
      color: #aaa;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.15s;
    }

    .tab-btn.active {
      color: var(--navy);
      border-bottom-color: var(--navy);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ---- MAIN LAYOUT ---- */
    main {
      padding: 14px;
      max-width: 580px;
      margin: 0 auto;
    }

    section {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--navy);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eef0fa;
    }

    /* ---- BANNER NICO ---- */
    #nico-banner {
      background: #eef0fa;
      border: 1px solid #c5caf0;
      border-radius: 10px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: 0.82rem;
      color: var(--navy);
      font-weight: 600;
      text-align: center;
    }

    /* ---- TOTAL ---- */
    .total-block { text-align: center; padding: 4px 0 18px; }

    .total-numbers {
      font-size: 3rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
      letter-spacing: -1px;
    }

    .total-numbers .slash { color: #bbb; font-size: 2.2rem; margin: 0 4px; font-weight: 400; }
    .total-pct { font-size: 1rem; color: var(--gray); margin-top: 6px; }

    /* ---- PROGRESS BAR ---- */
    .bar-wrap {
      background: #e8e8e8;
      border-radius: 100px;
      height: 11px;
      overflow: hidden;
      margin: 10px 0;
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.5s ease;
    }

    .bar-fill.green  { background: var(--green); }
    .bar-fill.yellow { background: var(--yellow); }
    .bar-fill.gray   { background: #ccc; }

    /* ---- BRAND LIST ---- */
    .brand-row { padding: 10px 0; border-top: 1px solid #f2f2f2; }
    .brand-row:first-child { border-top: none; }

    .brand-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }

    .brand-name { font-weight: 600; font-size: 0.92rem; }
    .brand-count { font-size: 0.82rem; color: var(--gray); }

    /* ---- PLAN / RUTA ---- */
    .day-row {
      padding: 11px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f5f5f5;
      border-left: 4px solid transparent;
    }

    .day-row.today { background: #eef0fa; border-left-color: var(--navy); }

    .day-header { display: flex; justify-content: space-between; align-items: center; }
    .day-date { font-weight: 700; font-size: 0.9rem; }
    .day-row.today .day-date { color: var(--navy); }

    .today-badge {
      background: var(--navy);
      color: white;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 6px;
    }

    .day-total { font-size: 0.8rem; color: var(--gray); white-space: nowrap; }

    .day-brands { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      background: white;
      border: 1px solid #ddd;
      border-radius: 100px;
      font-size: 0.7rem;
      padding: 2px 9px;
      color: #555;
    }

    /* ---- VIDEOS TAB ---- */
    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filter-chip {
      padding: 5px 13px;
      border-radius: 100px;
      border: 1.5px solid #ddd;
      background: white;
      font-size: 0.75rem;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-chip.active {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }

    .videos-meta {
      font-size: 0.75rem;
      color: var(--gray);
      margin-bottom: 10px;
    }

    .videos-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -4px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

    th {
      text-align: left;
      padding: 8px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--navy);
      border-bottom: 2px solid #eef0fa;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { background: #f8f9ff; }

    .sort-icon { margin-left: 3px; opacity: 0.35; font-size: 0.65rem; }
    .sort-icon.on { opacity: 1; }

    td { padding: 9px 10px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
    tr:last-child td { border-bottom: none; }

    .td-fecha { white-space: nowrap; color: #777; font-size: 0.78rem; }
    .td-marca { font-weight: 600; color: var(--navy); font-size: 0.8rem; white-space: nowrap; }
    .td-obs   { color: #888; font-size: 0.78rem; }

    /* ---- LOADING / ERROR ---- */
    #loading {
      text-align: center;
      padding: 56px 16px;
      color: var(--gray);
    }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #e0e0e0;
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-block {
      display: none;
      margin: 40px 16px;
      text-align: center;
    }

    #error-block p { color: var(--red); margin-bottom: 14px; font-size: 0.95rem; line-height: 1.5; }

    .btn {
      background: var(--navy);
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <h1>Producción TikTok — Viviana</h1>
  <p id="updated">Cargando...</p>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="avance" onclick="showTab('avance')">Avance</button>
  <button class="tab-btn" data-tab="ruta" onclick="showTab('ruta')">Ruta</button>
  <button class="tab-btn" data-tab="videos" onclick="showTab('videos')">Videos</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando datos...</p>
</div>

<main id="main" style="display:none">
  <div id="nico-banner" style="display:none"></div>

  <!-- PESTAÑA: AVANCE -->
  <div id="tab-avance" class="tab-panel active">
    <section>
      <h2>Tu avance de este mes</h2>
      <div id="avance-content"></div>
    </section>
  </div>

  <!-- PESTAÑA: RUTA -->
  <div id="tab-ruta" class="tab-panel">
    <section>
      <h2>Ruta a seguir</h2>
      <div id="plan-content"></div>
    </section>
  </div>

  <!-- PESTAÑA: VIDEOS -->
  <div id="tab-videos" class="tab-panel">
    <section>
      <h2>Videos subidos</h2>
      <div class="filter-bar" id="filter-bar"></div>
      <div class="videos-meta" id="videos-meta"></div>
      <div class="videos-table-wrap">
        <table>
          <thead id="videos-thead"></thead>
          <tbody id="videos-tbody"></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<div id="error-block">
  <p>No se pudo cargar los datos.<br>Reintentá en unos minutos.</p>
  <button class="btn" onclick="loadData()">Reintentar</button>
</div>

<script>
var SHEET_ID = '1V5n2q1Ng-ROmSszFEknCUiO4Q6-EmHAJuiLUAAN-178';
var BASE = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv';

/* ---- CSV parser RFC 4180 ---- */
function parseCSV(text) {
  var rows = [];
  var row = [], field = '', inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i], n = text[i + 1];
    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { field += c; }
    } else {
      if (c === '"') { inQ = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\r' && n === '\n') { row.push(field); rows.push(row); row = []; field = ''; i++; }
      else if (c === '\n' || c === '\r') { row.push(field); rows.push(row); row = []; field = ''; }
      else { field += c; }
    }
  }
  if (row.length || field) { row.push(field); rows.push(row); }
  return rows;
}

async function fetchSheet(sheet, range) {
  var url = BASE + '&sheet=' + encodeURIComponent(sheet) + '&range=' + encodeURIComponent(range);
  var res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return parseCSV(await res.text());
}

/* ---- Date helpers ---- */
function parseDate(s) {
  if (!s) return null;
  s = s.trim();
  var m;
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (m) return new Date(+m[1], +m[2] - 1, +m[3]);
  // dd/mm/yyyy (formato europeo — el Sheet exporta así)
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (m) return new Date(+m[3], +m[2] - 1, +m[1]);
  // dd/mm/yy
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2})$/);
  if (m) return new Date(2000 + +m[3], +m[2] - 1, +m[1]);
  var d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}

function todayMidnight() {
  var d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function sameDay(a, b) {
  return a && b &&
    a.getFullYear() === b.getFullYear() &&
    a.getMonth() === b.getMonth() &&
    a.getDate() === b.getDate();
}

function fmtDate(d) {
  var days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  var months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}

/* ---- TABS ---- */
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b) {
    b.classList.toggle('active', b.dataset.tab === name);
  });
  document.getElementById('tab-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

/* ---- BANNER NICO ---- */
function renderNicoUpdate(rows) {
  var text = rows && rows[0] && rows[0][0] ? rows[0][0].trim() : '';
  var el = document.getElementById('nico-banner');
  if (text) {
    el.textContent = '📋 ' + text;
    el.style.display = 'block';
  } else {
    el.style.display = 'none';
  }
}

/* ---- AVANCE DEL MES ---- */
function renderAvance(rows) {
  var totalPub = 0, totalCont = 0, totalPct = 0;
  var brands = [];

  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    var marca = (r[0] || '').trim();
    if (!marca) continue;
    var cont = parseInt(r[1]) || 0;
    var pub  = parseInt(r[3]) || 0;
    var pct  = parseFloat((r[5] || '').replace('%', '').replace(',', '.')) || 0;
    pct = pct / 100;

    if (marca.toUpperCase() === 'TOTAL') {
      totalPub = pub; totalCont = cont; totalPct = pct;
    } else {
      brands.push({ marca: marca, cont: cont, pub: pub, pct: pct });
    }
  }

  var pctRound = Math.round(totalPct * 100);
  var barColor = pctRound >= 70 ? 'green' : pctRound >= 1 ? 'yellow' : 'gray';

  var html = '<div class="total-block">'
    + '<div class="total-numbers">' + totalPub + '<span class="slash">/</span>' + totalCont + '</div>'
    + '<div class="total-pct">' + pctRound + '% completado este mes</div>'
    + '</div>'
    + '<div class="bar-wrap"><div class="bar-fill ' + barColor + '" style="width:' + Math.min(pctRound, 100) + '%"></div></div>'
    + '<div style="margin-top:18px">';

  for (var j = 0; j < brands.length; j++) {
    var b = brands[j];
    var bPct = Math.round(b.pct * 100);
    var bColor = bPct >= 70 ? 'green' : bPct >= 1 ? 'yellow' : 'gray';
    html += '<div class="brand-row">'
      + '<div class="brand-header">'
      + '<span class="brand-name">' + b.marca + '</span>'
      + '<span class="brand-count">' + b.pub + ' / ' + b.cont + '</span>'
      + '</div>'
      + '<div class="bar-wrap"><div class="bar-fill ' + bColor + '" style="width:' + Math.min(bPct, 100) + '%"></div></div>'
      + '</div>';
  }

  html += '</div>';
  document.getElementById('avance-content').innerHTML = html;
}

/* ---- RUTA A SEGUIR ---- */
function renderPlan(rows) {
  var brandNames = ['Joyspring','Veggie Doctor','Celtic Salt','K2O','Kind Patches MB','Kind Patches Red','Ceelike'];
  var hoy = todayMidnight();
  var plan = [];

  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    var fechaStr = (r[0] || '').trim();
    if (!fechaStr) continue;
    var fecha = parseDate(fechaStr);
    if (!fecha || fecha < hoy) continue;

    var total = parseInt(r[8]) || 0;
    var brands = [];
    for (var j = 0; j < brandNames.length; j++) {
      var v = parseInt(r[j + 1]) || 0;
      if (v > 0) brands.push({ name: brandNames[j], v: v });
    }
    plan.push({ fecha: fecha, total: total, brands: brands, isToday: sameDay(fecha, hoy) });
  }

  plan.sort(function(a, b) { return a.fecha - b.fecha; });

  if (!plan.length) {
    document.getElementById('plan-content').innerHTML =
      '<p style="color:#9e9e9e;text-align:center;padding:16px">No hay días pendientes este mes 🎉</p>';
    return;
  }

  var html = '';
  for (var k = 0; k < plan.length; k++) {
    var d = plan[k];
    var todayClass = d.isToday ? ' today' : '';
    var badge = d.isToday ? '<span class="today-badge">hoy</span>' : '';
    var chips = d.brands.map(function(b) {
      return '<span class="chip">' + b.name + (b.v > 1 ? ' ×' + b.v : '') + '</span>';
    }).join('');

    html += '<div class="day-row' + todayClass + '">'
      + '<div class="day-header">'
      + '<span class="day-date">' + fmtDate(d.fecha) + badge + '</span>'
      + '<span class="day-total">' + d.total + ' video' + (d.total !== 1 ? 's' : '') + '</span>'
      + '</div>'
      + (d.brands.length ? '<div class="day-brands">' + chips + '</div>' : '')
      + '</div>';
  }

  document.getElementById('plan-content').innerHTML = html;
}

/* ---- VIDEOS ---- */
var allVideos = [];
var videoSort = { col: 'fecha', dir: 'desc' };
var videoFilter = null;

var VIDEO_COLS = [
  { key: 'fecha',    label: 'Fecha' },
  { key: 'producto', label: 'Producto' },
  { key: 'obs',      label: 'Observaciones' },
  { key: 'marca',    label: 'Marca' }
];

function processVideos(rows) {
  // cols: A=fecha(0), B=producto(1), C=Marca(2), D=observaciones(3)
  var result = [];
  var brandsSet = {};

  for (var i = 1; i < rows.length; i++) {
    var r = rows[i];
    var fecha   = (r[0] || '').trim();
    var producto = (r[1] || '').trim();
    var marca   = (r[2] || '').trim();
    var obs     = (r[3] || '').trim();
    if (!fecha && !producto && !marca) continue;

    var d = parseDate(fecha);
    result.push({ fecha: fecha, producto: producto, marca: marca, obs: obs, _ts: d ? d.getTime() : 0 });
    if (marca) brandsSet[marca] = true;
  }

  allVideos = result;

  // Build filter chips
  var brands = Object.keys(brandsSet).sort(function(a,b){ return a.localeCompare(b, 'es'); });
  var filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = '';

  var allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.textContent = 'Todas';
  allChip.addEventListener('click', function() { setVideoFilter(null); });
  filterBar.appendChild(allChip);

  for (var j = 0; j < brands.length; j++) {
    (function(brand) {
      var chip = document.createElement('button');
      chip.className = 'filter-chip';
      chip.textContent = brand;
      chip.addEventListener('click', function() { setVideoFilter(brand); });
      filterBar.appendChild(chip);
    })(brands[j]);
  }

  renderVideosHeader();
  renderVideosBody();
}

function setVideoFilter(marca) {
  videoFilter = marca;
  document.querySelectorAll('#filter-bar .filter-chip').forEach(function(c) {
    var isAll = (marca === null && c.textContent === 'Todas');
    var isBrand = (marca !== null && c.textContent === marca);
    c.classList.toggle('active', isAll || isBrand);
  });
  renderVideosBody();
}

function setVideoSort(col) {
  if (videoSort.col === col) {
    videoSort.dir = videoSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    videoSort.col = col;
    videoSort.dir = 'asc';
  }
  renderVideosHeader();
  renderVideosBody();
}

function renderVideosHeader() {
  var html = '<tr>';
  for (var i = 0; i < VIDEO_COLS.length; i++) {
    var col = VIDEO_COLS[i];
    var isActive = videoSort.col === col.key;
    var arrow = isActive ? (videoSort.dir === 'asc' ? '▲' : '▼') : '⇅';
    html += '<th onclick="setVideoSort(\'' + col.key + '\')">'
      + col.label
      + ' <span class="sort-icon' + (isActive ? ' on' : '') + '">' + arrow + '</span>'
      + '</th>';
  }
  html += '</tr>';
  document.getElementById('videos-thead').innerHTML = html;
}

function renderVideosBody() {
  var data = allVideos;

  if (videoFilter) {
    data = data.filter(function(v) { return v.marca === videoFilter; });
  }

  data = data.slice().sort(function(a, b) {
    var va, vb;
    if (videoSort.col === 'fecha') {
      va = a._ts; vb = b._ts;
    } else {
      va = (a[videoSort.col] || '').toLowerCase();
      vb = (b[videoSort.col] || '').toLowerCase();
    }
    var cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return videoSort.dir === 'asc' ? cmp : -cmp;
  });

  document.getElementById('videos-meta').textContent =
    data.length + ' video' + (data.length !== 1 ? 's' : '');

  var html = '';
  for (var i = 0; i < data.length; i++) {
    var v = data[i];
    html += '<tr>'
      + '<td class="td-fecha">' + escHtml(v.fecha) + '</td>'
      + '<td>' + escHtml(v.producto) + '</td>'
      + '<td class="td-obs">' + escHtml(v.obs) + '</td>'
      + '<td class="td-marca">' + escHtml(v.marca) + '</td>'
      + '</tr>';
  }

  document.getElementById('videos-tbody').innerHTML = html || '<tr><td colspan="4" style="text-align:center;padding:20px;color:#aaa">Sin resultados</td></tr>';
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ---- CARGA PRINCIPAL ---- */
async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('error-block').style.display = 'none';

  try {
    var results = await Promise.all([
      fetchSheet('Retainers', 'A3:G25'),
      fetchSheet('Plan dinámico', 'A19:I50'),
      fetchSheet('Resumen', 'A13:D13'),
      fetchSheet('videos', 'A1:D300')
    ]);

    renderAvance(results[0]);
    renderPlan(results[1]);
    renderNicoUpdate(results[2]);
    processVideos(results[3]);

    var now = new Date();
    var hhmm = now.toLocaleTimeString('es-UY', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('updated').textContent = 'Actualizado: ' + hhmm;

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-block').style.display = 'block';
  }
}

setInterval(loadData, 5 * 60 * 1000);
loadData();
</script>

</body>
</html>
