<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Dashboard Viviana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #2d3a8c;
      --green: #2e7d32;
      --red: #c62828;
      --yellow: #f57f17;
      --gray: #9e9e9e;
      --text: #1a1a2e;
      --header-h: 65px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- HEADER ---- */
    header {
      background: var(--navy);
      color: white;
      padding: 14px 20px 10px;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      height: var(--header-h);
    }

    header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.3px; }
    #updated { font-size: 0.72rem; opacity: 0.7; margin-top: 3px; }

    /* ---- TABS ---- */
    .tab-bar {
      display: flex;
      background: white;
      border-bottom: 2px solid #e8e8e8;
      position: sticky;
      top: var(--header-h);
      z-index: 10;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .tab-btn {
      flex: 1;
      padding: 11px 4px;
      font-size: 0.72rem;
      font-weight: 700;
      text-align: center;
      border: none;
      background: none;
      color: #aaa;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: color 0.15s;
    }

    .tab-btn.active {
      color: var(--navy);
      border-bottom-color: var(--navy);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ---- MAIN LAYOUT ---- */
    main {
      padding: 14px;
      max-width: 580px;
      margin: 0 auto;
    }

    section {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }

    h2 {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--navy);
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 2px solid #eef0fa;
    }

    /* ---- TOTAL ---- */
    .total-block { text-align: center; padding: 4px 0 18px; }

    .total-numbers {
      font-size: 3rem;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
      letter-spacing: -1px;
    }

    .total-numbers .slash { color: #bbb; font-size: 2.2rem; margin: 0 4px; font-weight: 400; }
    .total-pct { font-size: 1rem; color: var(--gray); margin-top: 6px; }

    /* ---- PROGRESS BAR ---- */
    .bar-wrap {
      background: #e8e8e8;
      border-radius: 100px;
      height: 11px;
      overflow: hidden;
      margin: 10px 0;
    }

    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.5s ease;
    }

    .bar-fill.green  { background: var(--green); }
    .bar-fill.yellow { background: var(--yellow); }
    .bar-fill.gray   { background: #ccc; }

    /* ---- BRAND LIST ---- */
    .brand-row { padding: 10px 0; border-top: 1px solid #f2f2f2; }
    .brand-row:first-child { border-top: none; }

    .brand-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }

    .brand-name { font-weight: 600; font-size: 0.92rem; }
    .brand-count { font-size: 0.82rem; color: var(--gray); }

    /* ---- PLAN / RUTA ---- */
    .day-row {
      padding: 11px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f5f5f5;
      border-left: 4px solid transparent;
    }

    .day-row.today { background: #eef0fa; border-left-color: var(--navy); }

    .day-header { display: flex; justify-content: space-between; align-items: center; }
    .day-date { font-weight: 700; font-size: 0.9rem; }
    .day-row.today .day-date { color: var(--navy); }

    .today-badge {
      background: var(--navy);
      color: white;
      font-size: 0.62rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-left: 6px;
    }

    .day-total { font-size: 0.8rem; color: var(--gray); white-space: nowrap; }

    .day-brands { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }

    .chip {
      background: white;
      border: 1px solid #ddd;
      border-radius: 100px;
      font-size: 0.7rem;
      padding: 2px 9px;
      color: #555;
    }

    /* ---- MESES ANTERIORES (historial) ---- */
    .month-card { border: 1px solid #eef0fa; border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
    .month-card summary {
      list-style: none; cursor: pointer; padding: 12px 14px;
      display: flex; justify-content: space-between; align-items: center;
      background: #f7f8fc; font-size: 0.9rem;
    }
    .month-card summary::-webkit-details-marker { display: none; }
    .m-label { font-weight: 700; color: var(--navy); }
    .m-count { color: var(--gray); font-size: 0.85rem; }
    .m-detail { padding: 12px 14px; }
    .vid-list { margin-top: 12px; border-top: 1px solid #f2f2f2; padding-top: 10px; }
    .vid-head { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--gray); margin-bottom: 8px; }
    .vid-row { font-size: 0.8rem; color: #444; padding: 3px 0; }

    /* ---- VIDEOS TAB ---- */
    .filter-bar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .filter-chip {
      padding: 5px 13px;
      border-radius: 100px;
      border: 1.5px solid #ddd;
      background: white;
      font-size: 0.75rem;
      font-weight: 600;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-chip.active {
      background: var(--navy);
      border-color: var(--navy);
      color: white;
    }

    .videos-meta {
      font-size: 0.75rem;
      color: var(--gray);
      margin-bottom: 10px;
    }

    .videos-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0 -4px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }

    th {
      text-align: left;
      padding: 8px 10px;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--navy);
      border-bottom: 2px solid #eef0fa;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    th:hover { background: #f8f9ff; }

    .sort-icon { margin-left: 3px; opacity: 0.35; font-size: 0.65rem; }
    .sort-icon.on { opacity: 1; }

    td { padding: 9px 10px; border-bottom: 1px solid #f2f2f2; vertical-align: top; }
    tr:last-child td { border-bottom: none; }

    .td-fecha { white-space: nowrap; color: #777; font-size: 0.78rem; }
    .td-mes   { white-space: nowrap; color: #999; font-size: 0.76rem; }
    .td-marca { font-weight: 600; color: var(--navy); font-size: 0.8rem; white-space: nowrap; }
    .td-obs   { color: #888; font-size: 0.78rem; }

    /* ---- LOADING / ERROR ---- */
    #loading {
      text-align: center;
      padding: 56px 16px;
      color: var(--gray);
    }

    .spinner {
      width: 34px; height: 34px;
      border: 3px solid #e0e0e0;
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #error-block {
      display: none;
      margin: 40px 16px;
      text-align: center;
    }

    #error-block p { color: var(--red); margin-bottom: 14px; font-size: 0.95rem; line-height: 1.5; }

    .btn {
      background: var(--navy);
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .empty-note { color: #9e9e9e; text-align: center; padding: 8px 0; font-size: 0.9rem; }
    .warn-note { color: var(--red); font-size: 0.82rem; margin-bottom: 12px; }
  </style>
</head>
<body>

<header>
  <h1>Producción TikTok — Viviana</h1>
  <p id="updated">Cargando...</p>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="avance" onclick="showTab('avance')">Avance</button>
  <button class="tab-btn" data-tab="ruta" onclick="showTab('ruta')">Ruta</button>
  <button class="tab-btn" data-tab="videos" onclick="showTab('videos')">Videos</button>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Cargando datos...</p>
</div>

<main id="main" style="display:none">

  <!-- PESTAÑA: AVANCE -->
  <div id="tab-avance" class="tab-panel active">
    <section>
      <h2 id="avance-title">Este mes</h2>
      <div id="avance-content"></div>
    </section>
    <section>
      <h2>Meses anteriores</h2>
      <div id="history-content"></div>
    </section>
  </div>

  <!-- PESTAÑA: RUTA -->
  <div id="tab-ruta" class="tab-panel">
    <section>
      <h2>Ruta a seguir</h2>
      <div id="plan-content"></div>
    </section>
  </div>

  <!-- PESTAÑA: VIDEOS -->
  <div id="tab-videos" class="tab-panel">
    <section>
      <h2>Videos subidos</h2>
      <div class="filter-bar" id="filter-bar"></div>
      <div class="videos-meta" id="videos-meta"></div>
      <div class="videos-table-wrap">
        <table>
          <thead id="videos-thead"></thead>
          <tbody id="videos-tbody"></tbody>
        </table>
      </div>
    </section>
  </div>
</main>

<div id="error-block">
  <p>No se pudo cargar los datos.<br>Reintentá en unos minutos.</p>
  <button class="btn" onclick="loadData()">Reintentar</button>
</div>

<script type="module">
import {
  parseCSV, videosFromCSV, contractsFromCSV, buildContracts, buildMonths,
  computeRuta, fmtDayMonth, monthLabel, videoDate,
} from './logic.js';

const SHEET_ID = '1V5n2q1Ng-ROmSszFEknCUiO4Q6-EmHAJuiLUAAN-178';
const BASE = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:csv';

// Lee la pestaña ENTERA (sin rango fijo): nunca se corta al crecer.
async function fetchSheet(sheet) {
  const url = BASE + '&sheet=' + encodeURIComponent(sheet);
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return parseCSV(await res.text());
}

/* ---- helpers de presentación ---- */
function todayYM(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}
function daysInMonth(d) {
  return new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
}
function todayMidnight() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function sameDay(a, b) {
  return a && b && a.getFullYear() === b.getFullYear() &&
    a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function fmtDate(d) {
  const days = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];
  const months = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sep', 'oct', 'nov', 'dic'];
  return days[d.getDay()] + ' ' + d.getDate() + ' ' + months[d.getMonth()];
}
function pctClass(pct01) {
  return pct01 >= 0.7 ? 'green' : pct01 > 0 ? 'yellow' : 'gray';
}
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

/* ---- TABS ---- */
function showTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.getElementById('tab-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

/* ---- barras por marca (compartido: mes actual + historial) ---- */
function renderBars(brands) {
  return brands.map(b => {
    const p = Math.round(b.pct * 100);
    return '<div class="brand-row"><div class="brand-header">'
      + '<span class="brand-name">' + escHtml(b.marca) + '</span>'
      + '<span class="brand-count">' + b.pub + ' / ' + b.meta + '</span></div>'
      + '<div class="bar-wrap"><div class="bar-fill ' + pctClass(b.pct)
      + '" style="width:' + Math.min(p, 100) + '%"></div></div></div>';
  }).join('');
}

/* ---- AVANCE del mes actual ---- */
function renderAvance(current) {
  const el = document.getElementById('avance-content');
  if (!current) { el.innerHTML = '<p class="empty-note">Sin datos para el mes actual.</p>'; return; }

  const p = Math.round(current.pct * 100);
  let html = '';
  if (!current.hasContract) html += '<p class="warn-note">Falta cargar el contrato de este mes.</p>';
  if (current.totalPub === 0) html += '<p class="empty-note">Aún no hay videos este mes.</p>';

  html += '<div class="total-block"><div class="total-numbers">' + current.totalPub
    + '<span class="slash">/</span>' + current.totalMeta + '</div>'
    + '<div class="total-pct">' + p + '% completado este mes</div></div>'
    + '<div class="bar-wrap"><div class="bar-fill ' + pctClass(current.pct)
    + '" style="width:' + Math.min(p, 100) + '%"></div></div>'
    + '<div style="margin-top:18px">' + renderBars(current.brands) + '</div>';
  el.innerHTML = html;
}

/* ---- MESES ANTERIORES (historial desplegable) ---- */
function renderHistory(months) {
  const el = document.getElementById('history-content');
  const past = months.filter(m => !m.isCurrent);
  if (!past.length) { el.innerHTML = '<p class="empty-note">Todavía no hay meses anteriores.</p>'; return; }

  let html = '';
  for (const mv of past) {
    const done = mv.brands.length && mv.brands.every(b => b.complete);
    const badge = done ? '✅' : '⚠️';
    const vids = mv.videos.map(v =>
      '<div class="vid-row">' + escHtml(v.fecha) + ' · ' + escHtml(v.marca)
      + (v.producto ? ' — ' + escHtml(v.producto) : '') + '</div>').join('');
    html += '<details class="month-card"><summary>'
      + '<span class="m-label">' + escHtml(mv.label) + '</span>'
      + '<span class="m-count">' + mv.totalPub + '/' + mv.totalMeta + ' ' + badge + '</span>'
      + '</summary><div class="m-detail">'
      + renderBars(mv.brands)
      + '<div class="vid-list"><div class="vid-head">Videos del mes (' + mv.videos.length + ')</div>'
      + (vids || '<div class="vid-row" style="color:#aaa">Sin videos cargados</div>')
      + '</div></div></details>';
  }
  el.innerHTML = html;
}

/* ---- RUTA A SEGUIR (mes actual) ---- */
function renderRuta(current, now) {
  const el = document.getElementById('plan-content');
  if (!current) { el.innerHTML = '<p class="empty-note">Sin datos para el mes actual.</p>'; return; }
  if (!current.hasContract) { el.innerHTML = '<p class="warn-note">Falta cargar el contrato de este mes.</p>'; return; }

  const ruta = computeRuta(current, now, daysInMonth(now));
  if (!ruta.length) {
    el.innerHTML = '<p class="empty-note" style="padding:16px 0">No hay videos pendientes este mes 🎉</p>';
    return;
  }
  const hoy = todayMidnight();
  let html = '';
  for (const d of ruta) {
    const isToday = sameDay(d.date, hoy);
    const todayClass = isToday ? ' today' : '';
    const badge = isToday ? '<span class="today-badge">hoy</span>' : '';
    const chips = d.brands.map(b =>
      '<span class="chip">' + escHtml(b.marca) + (b.n > 1 ? ' ×' + b.n : '') + '</span>').join('');
    html += '<div class="day-row' + todayClass + '"><div class="day-header">'
      + '<span class="day-date">' + fmtDate(d.date) + badge + '</span>'
      + '<span class="day-total">' + d.total + ' video' + (d.total !== 1 ? 's' : '') + '</span>'
      + '</div>' + (d.brands.length ? '<div class="day-brands">' + chips + '</div>' : '') + '</div>';
  }
  el.innerHTML = html;
}

/* ---- VIDEOS (buscador multi-mes con filtro y orden) ---- */
let allVideos = [];
let videoSort = { col: 'fecha', dir: 'desc' };
let videoFilter = null;

const VIDEO_COLS = [
  { key: 'mesLabel', label: 'Mes' },
  { key: 'fecha',    label: 'Fecha' },
  { key: 'producto', label: 'Producto' },
  { key: 'obs',      label: 'Observaciones' },
  { key: 'marca',    label: 'Marca' },
];

function processVideos(videoObjs) {
  videoFilter = null; // el filtro se resetea a "Todas" al reconstruir (evita highlight desincronizado tras auto-refresh)
  allVideos = videoObjs.map(v => ({
    mes: v.mes, mesLabel: monthLabel(v.mes),
    fecha: v.fecha, producto: v.producto, marca: v.marca, obs: v.obs,
    _ts: videoDate(v.mes, v.fecha).getTime(),
  }));

  const brandsSet = {};
  for (const v of allVideos) if (v.marca) brandsSet[v.marca] = true;
  const brands = Object.keys(brandsSet).sort((a, b) => a.localeCompare(b, 'es'));

  const filterBar = document.getElementById('filter-bar');
  filterBar.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'filter-chip active';
  allChip.textContent = 'Todas';
  allChip.addEventListener('click', () => setVideoFilter(null));
  filterBar.appendChild(allChip);
  for (const brand of brands) {
    const chip = document.createElement('button');
    chip.className = 'filter-chip';
    chip.textContent = brand;
    chip.addEventListener('click', () => setVideoFilter(brand));
    filterBar.appendChild(chip);
  }

  renderVideosHeader();
  renderVideosBody();
}

function setVideoFilter(marca) {
  videoFilter = marca;
  document.querySelectorAll('#filter-bar .filter-chip').forEach(c => {
    const isAll = marca === null && c.textContent === 'Todas';
    const isBrand = marca !== null && c.textContent === marca;
    c.classList.toggle('active', isAll || isBrand);
  });
  renderVideosBody();
}

function setVideoSort(col) {
  if (videoSort.col === col) videoSort.dir = videoSort.dir === 'asc' ? 'desc' : 'asc';
  else { videoSort.col = col; videoSort.dir = 'asc'; }
  renderVideosHeader();
  renderVideosBody();
}

function renderVideosHeader() {
  let html = '<tr>';
  for (const col of VIDEO_COLS) {
    const isActive = videoSort.col === col.key;
    const arrow = isActive ? (videoSort.dir === 'asc' ? '▲' : '▼') : '⇅';
    html += '<th onclick="setVideoSort(\'' + col.key + '\')">' + col.label
      + ' <span class="sort-icon' + (isActive ? ' on' : '') + '">' + arrow + '</span></th>';
  }
  html += '</tr>';
  document.getElementById('videos-thead').innerHTML = html;
}

function renderVideosBody() {
  let data = allVideos;
  if (videoFilter) data = data.filter(v => v.marca === videoFilter);

  data = data.slice().sort((a, b) => {
    let va, vb;
    if (videoSort.col === 'fecha') { va = a._ts; vb = b._ts; }
    else if (videoSort.col === 'mesLabel') { va = a.mes; vb = b.mes; } // orden cronológico real (YYYY-MM)
    else { va = (a[videoSort.col] || '').toLowerCase(); vb = (b[videoSort.col] || '').toLowerCase(); }
    const cmp = va < vb ? -1 : va > vb ? 1 : 0;
    return videoSort.dir === 'asc' ? cmp : -cmp;
  });

  document.getElementById('videos-meta').textContent =
    data.length + ' video' + (data.length !== 1 ? 's' : '');

  let html = '';
  for (const v of data) {
    html += '<tr>'
      + '<td class="td-mes">' + escHtml(v.mesLabel) + '</td>'
      + '<td class="td-fecha">' + escHtml(v.fecha) + '</td>'
      + '<td>' + escHtml(v.producto) + '</td>'
      + '<td class="td-obs">' + escHtml(v.obs) + '</td>'
      + '<td class="td-marca">' + escHtml(v.marca) + '</td>'
      + '</tr>';
  }
  document.getElementById('videos-tbody').innerHTML =
    html || '<tr><td colspan="5" style="text-align:center;padding:20px;color:#aaa">Sin resultados</td></tr>';
}

/* ---- CARGA PRINCIPAL ---- */
async function loadData() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('main').style.display = 'none';
  document.getElementById('error-block').style.display = 'none';

  try {
    const [videoRows, contractRows] = await Promise.all([
      fetchSheet('Videos'),
      fetchSheet('Contratos'),
    ]);

    const now = new Date();
    const videoObjs = videosFromCSV(videoRows);
    const months = buildMonths(
      videoObjs,
      buildContracts(contractsFromCSV(contractRows)),
      todayYM(now),
    );
    const current = months.find(m => m.isCurrent) || null;

    document.getElementById('avance-title').textContent =
      current ? 'Este mes — ' + current.label : 'Este mes';
    renderAvance(current);
    renderHistory(months);
    renderRuta(current, now);
    processVideos(videoObjs);

    let last = null;
    for (const m of months) if (m.lastDate && (!last || m.lastDate > last)) last = m.lastDate;
    document.getElementById('updated').textContent =
      last ? 'Datos hasta el ' + fmtDayMonth(last) : 'Sin datos cargados';

    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
  } catch (e) {
    console.error(e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-block').style.display = 'block';
  }
}

// Exponer a window para los onclick inline del HTML.
window.showTab = showTab;
window.setVideoSort = setVideoSort;
window.loadData = loadData;
